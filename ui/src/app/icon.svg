<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer circle with gradient border -->
  <circle cx="50" cy="50" r="45" stroke="url(#primaryGrad)" stroke-width="4" stroke-linecap="round" />
  
  <!-- Outer glowing rings -->
  <circle cx="50" cy="50" r="45" stroke="url(#primaryGrad)" stroke-width="2" stroke-opacity="0.3" filter="url(#glow)" />

  <g filter="url(#glow)">
    <!-- Cloud shape -->
    <path d="M 32 58 A 9 9 0 0 1 38 41 A 14 14 0 0 1 61 40 A 10 10 0 0 1 68 58 Z" fill="url(#primaryGrad)" />
    
    <!-- Share arrow (upwards) -->
    <path d="M 50 64 L 50 48" stroke="white" stroke-width="3.5" stroke-linecap="round" />
    <path d="M 44 54 L 50 48 L 56 54" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
